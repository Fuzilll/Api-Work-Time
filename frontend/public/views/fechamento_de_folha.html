<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fechamento de Folha</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/fechamento_de_folha.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="sidebar closed" id="sidebar">
        <img src="/assets/images/abrir.png" alt="Abrir" class="toggle-btn" id="toggleBtn">
        <div class="logo-container text-center">
            <img src="/assets/images/logo.png" alt="Logo" class="img-fluid">
        </div>
        <div id="menu"></div>
        <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Sair</span></a>
    </div>
    
    <div class="mobile-menu">
        <div class="mobile-header">
            <button class="mobile-menu-toggle">
                <i class="fas fa-bars"></i>
            </button>
            <img src="/assets/images/logo-mobile.png" alt="Logo" class="mobile-logo">
        </div>
        <div class="mobile-menu-items" id="mobileMenu"></div>
    </div>

    <div class="content">
        <div class="topbar">
            <button class="help-btn"><i class="fas fa-question-circle"></i> Ajuda</button>
        </div>

        <h1>Fechamento de Folha de Ponto - <span id="periodoFechamento"></span></h1>

        <div class="filtros-container">
                        <div class="periodo-controle">
                <select id="selectMes" class="form-select">
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6" selected>Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
                <select id="selectAno" class="form-select">
                    <option value="2023">2023</option>
                    <option value="2024">2024</option>
                    <option value="2025" selected>2025</option>
                </select>
                <button id="btnAtualizarPeriodo" class="btn btn-primary">Atualizar</button>
            </div>
            <div class="filtros">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" id="filtroNome" class="form-control" placeholder="Pesquisar por nome">
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-briefcase"></i></span>
                    <input type="text" id="filtroCargo" class="form-control" placeholder="Pesquisar por cargo">
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-exclamation-triangle"></i></span>
                    <select id="filtroDesvios" class="form-control">
                        <option value="">Todos</option>
                        <option value="com">Com desvios</option>
                        <option value="sem">Sem desvios</option>
                    </select>
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-list-ol"></i></span>
                    <select id="qtdPorPagina" class="form-control">
                        <option value="5">5 itens</option>
                        <option value="10" selected>10 itens</option>
                        <option value="20">20 itens</option>
                        <option value="50">50 itens</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table id="tabelaFuncionarios" class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nome</th>
                        <th>Cargo</th>
                        <th>Horas Trabalhadas</th>
                        <th>Horas Extras</th>
                        <th>Faltas</th>
                        <th>Desvios</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center" id="paginacao"></ul>
        </nav>

        <!-- Modal de Detalhes -->
        <div class="modal fade" id="modalFechamento" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalNome"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6">
                                <p><strong>Cargo:</strong> <span id="modalCargo"></span></p>
                                <p><strong>Horas Trabalhadas:</strong> <span id="modalHoras"></span></p>
                                <p><strong>Horas Extras:</strong> <span id="modalExtras"></span></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Faltas:</strong> <span id="modalFaltas"></span></p>
                                <p><strong>Salário Base:</strong> R$ <span id="modalSalario"></span></p>
                                <p><strong>Desvios:</strong> <button class="btn btn-sm btn-info" id="btnVerDesvios">Ver detalhes</button></p>
                            </div>
                        </div>
                        
                        <hr>
                        
                        <h5>Fechamento de Ponto</h5>
                        <div class="mb-3">
                            <label for="observacoes" class="form-label">Observações:</label>
                            <textarea class="form-control" id="observacoes" rows="3" placeholder="Observações sobre o fechamento (opcional)"></textarea>
                        </div>
                        
                        <div id="statusFechamento" class="alert mb-3" style="display: none;"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="button" id="btnFecharPonto" class="btn btn-primary">Confirmar Fechamento</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal de Desvios -->
        <div class="modal fade" id="modalDesvios" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Detalhes dos Desvios</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="conteudoDesvios">
                        <!-- Conteúdo será injetado por JavaScript -->
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="loading-overlay">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
        </div>
        
        <div id="error-message" class="alert alert-danger alert-dismissible fade show" style="display: none;">
            <span id="error-text"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/sidebarToggle.js"></script>
    <script src="/js/alterar_modo.js"></script>
    <script src="/js/fechamento_de_folha.js"></script>
</body>
</html>
